name: Deploy Shinylive app to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "shinylive_pdf_signer_source/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync
  cancel-in-progress: true

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Shinylive
        run: python -m pip install --upgrade pip shinylive

      - name: Export static site into docs
        run: |
          rm -rf docs
          mkdir -p docs
          shinylive export shinylive_pdf_signer_source docs

      - name: Commit refreshed docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh published Shinylive site"
          file_pattern: docs/**